<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 World Cup 2026 Quiniela</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <style>
        .active-tab { background: rgba(59, 130, 246, 0.15); border-color: #3b82f6; color: #60a5fa; font-weight: 800; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .glass-panel { background: rgba(30, 41, 59, 0.45); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="bg-[#0b0f19] min-h-screen text-slate-200 font-sans pb-16 antialiased">

    <nav class="sticky top-0 bg-[#0b0f19]/90 backdrop-blur-md z-40 border-b border-slate-800/80">
        <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="text-2xl">🏆</span>
                <h1 class="text-sm font-black tracking-wider uppercase text-white">Quiniela 2026</h1>
            </div>
            <select id="userSelect" class="bg-slate-900 border border-slate-800 rounded-lg px-3 py-1.5 text-xs font-black text-blue-400 outline-none cursor-pointer">
                <option value="Nunu">Nunu</option>
                <option value="Charlie">Charlie</option>
                <option value="Paddy">Paddy</option>
                <option value="Lore">Lore</option>
            </select>
        </div>

        <div class="max-w-5xl mx-auto px-4 overflow-x-auto flex text-[10px] font-bold tracking-widest uppercase text-slate-400">
            <button onclick="switchTab('leaderboard')" id="tab-leaderboard" class="active-tab px-5 py-3.5 border-b-2 border-transparent whitespace-nowrap cursor-pointer">🏠 Leaderboard</button>
            <button onclick="switchTab('group-matches')" id="tab-group-matches" class="px-5 py-3.5 border-b-2 border-transparent whitespace-nowrap cursor-pointer">📅 Matches</button>
            <button onclick="switchTab('group-tables')" id="tab-group-tables" class="px-5 py-3.5 border-b-2 border-transparent whitespace-nowrap cursor-pointer">📊 Standings</button>
            <button onclick="switchTab('knockout')" id="tab-knockout" class="px-5 py-3.5 border-b-2 border-transparent whitespace-nowrap cursor-pointer">🌳 Brackets</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 mt-8">
        <div id="loading" class="text-center py-20 text-slate-500 font-black uppercase tracking-widest">Syncing Pipeline...</div>

        <section id="view-leaderboard" class="space-y-4">
            <div id="leaderboardList" class="glass-panel rounded-2xl overflow-hidden divide-y divide-slate-800"></div>
        </section>

        <section id="view-group-matches" class="hidden space-y-4">
            <div class="flex flex-col md:flex-row gap-3 glass-panel p-4 rounded-xl">
                <input type="date" id="dateFilter" class="bg-slate-950 border border-slate-800 text-slate-200 px-3 py-2 rounded-lg text-xs font-bold w-full outline-none">
                <select id="stageFilter" class="bg-slate-950 border border-slate-800 text-slate-200 px-3 py-2 rounded-lg text-xs font-bold w-full outline-none">
                    <option value="all">All Stages</option>
                </select>
            </div>
            <div id="matchesContainer" class="space-y-2"></div>
        </section>

        <section id="view-group-tables" class="hidden grid grid-cols-1 md:grid-cols-2 gap-4"></section>

        <section id="view-knockout" class="hidden space-y-8"></section>
    </main>

    <div id="predictionModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="glass-panel rounded-2xl max-w-sm w-full p-6 border border-slate-800">
            <h3 id="modalMatchInfo" class="text-xs font-black text-blue-400 uppercase tracking-widest mb-4 text-center"></h3>
            <div class="flex items-center justify-center gap-4 mb-6">
                <div class="text-center w-1/3 text-xs font-bold"><div id="homeFlag" class="text-2xl mb-1"></div><div id="homeName"></div></div>
                <div class="flex gap-1">
                    <input type="number" id="inputHome" class="w-12 h-12 bg-slate-950 border border-slate-800 rounded-lg text-center text-xl font-black text-white">
                    <input type="number" id="inputAway" class="w-12 h-12 bg-slate-950 border border-slate-800 rounded-lg text-center text-xl font-black text-white">
                </div>
                <div class="text-center w-1/3 text-xs font-bold"><div id="awayFlag" class="text-2xl mb-1"></div><div id="awayName"></div></div>
            </div>
            <div class="flex gap-2">
                <button onclick="closeModal()" class="w-1/2 py-2 bg-slate-800 rounded-lg text-xs font-bold">Cancel</button>
                <button id="btnSave" onclick="savePrediction()" class="w-1/2 py-2 bg-blue-600 rounded-lg text-xs font-bold">Save</button>
            </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz8HQBdNlvluKApj9PgC9rHW8fwj0xZwI3-WdsIl1WU6bomB7MtkFQO4cjewf16hxnDtw/exec";
        
        const flags = { "Mexico": "🇲🇽", "South Africa": "🇿🇦", "South Korea": "🇰🇷", "Czechia": "🇨🇿", "Canada": "🇨🇦", "Bosnia and Herzegovina": "🇧🇦", "Qatar": "🇶🇦", "Switzerland": "🇨🇭", "Brazil": "🇧🇷", "Morocco": "🇲🇦", "Scotland": "🏴󠁧󠁢󠁳󠁣󠁴󠁿", "Haiti": "🇭🇹", "USA": "🇺🇸", "Paraguay": "🇵🇾", "Australia": "🇦🇺", "Türkiye": "🇹🇷", "Germany": "🇩🇪", "Curaçao": "🇨🇼", "Ivory Coast": "🇨🇮", "Ecuador": "🇪🇨", "Netherlands": "🇳🇱", "Japan": "🇯🇵", "Sweden": "🇸🇪", "Tunisia": "🇹🇳", "Belgium": "🇧🇪", "Egypt": "🇪🇬", "Iran": "🇮🇷", "New Zealand": "🇳🇿", "Spain": "🇪🇸", "Cape Verde": "🇨🇻", "Saudi Arabia": "🇸🇦", "Uruguay": "🇺🇾", "France": "🇫🇷", "Senegal": "🇸🇳", "Iraq": "🇮🇶", "Norway": "🇳🇴", "Argentina": "🇦🇷", "Algeria": "🇩🇿", "Austria": "🇦🇹", "Jordan": "🇯🇴", "Portugal": "🇵🇹", "Congo DR": "🇨🇩", "Uzbekistan": "🇺🇿", "Colombia": "🇨🇴", "England": "🏴󠁧󠁢󠁥󠁮󠁧󠁿", "Croatia": "🇭🇷", "Ghana": "🇬🇭", "Panama": "🇵🇦" };

        let appState = { matches: [], currentParticipant: "Nunu", filters: { date: "", stage: "all" } };
        let activeMatch = null;

        async function init() {
            try {
                const res = await fetch(WEB_APP_URL);
                appState.matches = await res.json();
                document.getElementById('loading').classList.add('hidden');
                populateFilters();
                renderAll();
            } catch(e) { console.error(e); }
        }

        function populateFilters() {
            const stages = [...new Set(appState.matches.map(m => m.Stage))];
            const select = document.getElementById('stageFilter');
            stages.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s; opt.textContent = s;
                select.appendChild(opt);
            });
        }

        function switchTab(tabId) {
            ['leaderboard', 'group-matches', 'group-tables', 'knockout'].forEach(t => {
                document.getElementById(`view-${t}`).classList.toggle('hidden', t !== tabId);
                document.getElementById(`tab-${t}`).classList.toggle('active-tab', t === tabId);
            });
        }

        function renderAll() {
            renderLeaderboard();
            renderMatches();
            renderTables();
            renderBrackets();
        }

        function renderLeaderboard() {
            const scores = { Nunu: 0, Charlie: 0, Paddy: 0, Lore: 0 };
            appState.matches.forEach(m => {
                const h = m["Real Score Home"], a = m["Real Score Away"];
                if(h === "") return;
                ["Nunu", "Charlie", "Paddy", "Lore"].forEach(p => {
                    const ph = m[p+" Home"], pa = m[p+" Away"];
                    if(ph == h && pa == a) scores[p] += 5;
                    else if(Math.sign(h-a) == Math.sign(ph-pa)) scores[p] += (h-a == ph-pa) ? 3 : 2;
                });
            });
            document.getElementById('leaderboardList').innerHTML = Object.entries(scores).sort((a,b) => b[1]-a[1]).map(([n, s]) => `
                <div class="grid grid-cols-12 p-4 items-center">
                    <div class="col-span-8 font-bold ${n === appState.currentParticipant ? 'text-blue-400' : 'text-slate-300'}">${n}</div>
                    <div class="col-span-4 text-right font-black">${s} pts</div>
                </div>`).join('');
        }

        function renderMatches() {
            const container = document.getElementById('matchesContainer');
            const dateFilter = document.getElementById('dateFilter').value;
            const stageFilter = document.getElementById('stageFilter').value;

            container.innerHTML = appState.matches.filter(m => {
                const dMatch = new Date(m["Match Datetime (MTY)"]).toISOString().split('T')[0];
                const dMatchCheck = dateFilter ? dMatch === dateFilter : true;
                const sMatchCheck = stageFilter !== "all" ? m.Stage === stageFilter : true;
                return dMatchCheck && sMatchCheck;
            }).map(m => {
                const isLocked = new Date() > new Date(m["Match Datetime (MTY)"]);
                const pH = m[appState.currentParticipant + " Home"];
                const pA = m[appState.currentParticipant + " Away"];
                return `
                    <div onclick="${isLocked ? '' : `openModal('${m.ID}')`}" class="glass-panel p-4 rounded-xl flex justify-between items-center ${isLocked ? 'opacity-40 cursor-not-allowed' : 'cursor-pointer hover:bg-slate-800'}">
                        <div class="text-[10px] font-bold text-slate-500 w-1/4">${m.Stage}</div>
                        <div class="text-xs font-bold w-2/4 text-center truncate">${m.Match}</div>
                        <div class="text-blue-400 font-black text-right w-1/4">${pH !== null && pH !== "" ? `${pH}-${pA}` : (isLocked ? 'Locked' : 'Bet')}</div>
                    </div>`;
            }).join('');
        }

        function renderTables() {
            const container = document.getElementById('view-group-tables');
            container.innerHTML = "";
            const stages = [...new Set(appState.matches.map(m => m.Stage))].filter(s => s.includes("Group"));
            stages.forEach(st => {
                const teams = {};
                appState.matches.filter(m => m.Stage === st).forEach(m => {
                    const [t1, t2] = m.Match.split(' vs ');
                    [t1, t2].forEach(t => { if(!teams[t]) teams[t] = {p:0, gd:0}; });
                    const rh = parseInt(m["Real Score Home"]), ra = parseInt(m["Real Score Away"]);
                    if(!isNaN(rh)) {
                        teams[t1].gd += (rh-ra); teams[t2].gd += (ra-rh);
                        if(rh > ra) teams[t1].p += 3; else if(ra > rh) teams[t2].p += 3; else {teams[t1].p++; teams[t2].p++;}
                    }
                });
                container.innerHTML += `
                    <div class="glass-panel p-4 rounded-xl">
                        <h4 class="font-black text-xs text-slate-500 mb-2">${st}</h4>
                        ${Object.entries(teams).sort((a,b) => b[1].p - a[1].p).map(([n, d]) => `
                            <div class="flex justify-between text-xs py-1 border-b border-slate-800">
                                <span>${flags[n] || "🏳️"} ${n}</span><span class="font-bold">${d.p} pts</span>
                            </div>`).join('')}
                    </div>`;
            });
        }

        function renderBrackets() {
            const container = document.getElementById('view-knockout');
            container.innerHTML = "";
            const stages = [...new Set(appState.matches.map(m => m.Stage))].filter(s => !s.includes("Group"));
            stages.forEach(st => {
                container.innerHTML += `<div><h4 class="font-black text-xs text-slate-500 mb-2">${st}</h4><div class="grid grid-cols-2 gap-2">
                    ${appState.matches.filter(m => m.Stage === st).map(m => `
                        <div class="glass-panel p-2 rounded text-[10px] font-bold text-center">${m.Match}</div>`).join('')}
                </div></div>`;
            });
        }

        function openModal(id) {
            activeMatch = appState.matches.find(m => m.ID === id);
            const [h, a] = activeMatch.Match.split(' vs ');
            document.getElementById('modalMatchInfo').textContent = `${activeMatch.Stage} | ${h} vs ${a}`;
            document.getElementById('homeName').textContent = h;
            document.getElementById('awayName').textContent = a;
            document.getElementById('homeFlag').textContent = flags[h] || "🏳️";
            document.getElementById('awayFlag').textContent = flags[a] || "🏳️";
            document.getElementById('inputHome').value = activeMatch[appState.currentParticipant + " Home"] || "";
            document.getElementById('inputAway').value = activeMatch[appState.currentParticipant + " Away"] || "";
            document.getElementById('predictionModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('predictionModal').classList.add('hidden'); }

        async function savePrediction() {
            const h = document.getElementById('inputHome').value;
            const a = document.getElementById('inputAway').value;
            const btn = document.getElementById('btnSave');
            btn.disabled = true; btn.textContent = "Saving...";
            
            try {
                await fetch(WEB_APP_URL, {
                    method: 'POST', mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ matchId: activeMatch.ID, participant: appState.currentParticipant, homeScore: parseInt(h), awayScore: parseInt(a) })
                });
                
                const idx = appState.matches.findIndex(m => m.ID === activeMatch.ID);
                appState.matches[idx][appState.currentParticipant + " Home"] = h;
                appState.matches[idx][appState.currentParticipant + " Away"] = a;
                
                closeModal();
                renderAll();
            } catch(e) { alert("Save failed"); } finally { btn.disabled = false; btn.textContent = "Save"; }
        }

        document.getElementById('userSelect').addEventListener('change', (e) => { appState.currentParticipant = e.target.value; renderAll(); });
        document.getElementById('dateFilter').addEventListener('change', renderMatches);
        document.getElementById('stageFilter').addEventListener('change', renderMatches);

        window.onload = init;
    </script>
</body>
</html>
